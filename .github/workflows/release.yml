name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC token for npm trusted publishing (no NPM_TOKEN needed)

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24 # OIDC trusted publishing needs Node > 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm CLI >= 11.5.1.
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # `pnpm run` so these resolve to the package scripts, not pnpm's
          # built-in `pnpm version` command.
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: `changeset publish` authenticates via OIDC trusted
          # publishing (id-token: write + a trusted publisher configured on npm).
